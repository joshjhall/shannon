# cargo-deny configuration (v0.19+)
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

# ─── Advisories ──────────────────────────────────────────────────────────────

[advisories]
ignore = [
  # rsa crate has a known timing side-channel with no patch available. Pulled
  # in transitively via octarine; Shannon does not use RSA directly.
  # Re-evaluate by 2026-10-01: check if upstream has patched or if the dep is dropped.
  { id = "RUSTSEC-2023-0071", reason = "no patch available, transitive via octarine — re-evaluate 2026-10-01" },
  # atomic-polyfill is unmaintained (not a vulnerability). Pulled in transitively
  # via octarine (phonenumber → postcard → heapless 0.7). Cannot upgrade away
  # without an upstream postcard bump to heapless 0.8+.
  # Re-evaluate by 2026-12-01: check if phonenumber/postcard moved to heapless 0.8+.
  { id = "RUSTSEC-2023-0089", reason = "unmaintained, transitive via octarine→phonenumber→postcard→heapless 0.7 — re-evaluate 2026-12-01" },
]

# ─── Licenses ────────────────────────────────────────────────────────────────

[licenses]
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSD-1-Clause",
  "0BSD",
  "ISC",
  "Unlicense",
  "Zlib",
  "CC0-1.0",
  "Unicode-3.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

exceptions = [
  # r-efi is dual-licensed MIT/Apache-2.0/LGPL-2.1+; we use it under MIT/Apache-2.0.
  { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
]

# ─── Sources ─────────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# octarine is consumed as a git dependency (pinned tag) per ARCHITECTURE.md §12.
allow-git = ["https://github.com/joshjhall/octarine"]
